---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>
  
  <a href="https://twitter.com/share?ref_src=twsrc%5Etfw" size="large" class="twitter-share-button" data-text="I’m reading {{ page.title }} by @ilanolkies" data-url="{{ site.url }}{{ page.url }}" data-show-count="false">Tweet</a><script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  
  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
